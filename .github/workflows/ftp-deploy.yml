# Laravel FTP Deploy - incremental (only changed files) + full fallback
name: Deploy to FTP

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_deploy:
        description: 'Force full deploy (mirror all files)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

env:
  FTP_SERVER: siparismasanda.com
  FTP_USERNAME: developer2@siparismasanda.com
  FTP_PASSWORD: uqurcan0302
  FTP_REMOTE_DIR: /
  # Node.js 20 deprecated on GitHub Actions; use Node 24 for JS actions (Haziran 2026 zorunlu)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ftp-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed files
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "__FULL__")
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          NEEDS_BUILD=false
          NEEDS_COMPOSER=false
          ONLY_VIEWS=true

          while IFS= read -r file; do
            case "$file" in
              __FULL__) NEEDS_BUILD=true; NEEDS_COMPOSER=true; ONLY_VIEWS=false; break ;;
              package*.json|vite.config*|resources/js/*|resources/css/*) NEEDS_BUILD=true; ONLY_VIEWS=false ;;
              composer.json|composer.lock) NEEDS_COMPOSER=true; ONLY_VIEWS=false ;;
              resources/views/*) ;; # views only, no build needed
              app/*|config/*|routes/*|database/*|lang/*) ONLY_VIEWS=false ;;
            esac
          done <<< "$CHANGED"

          if [ "${{ github.event.inputs.full_deploy }}" = "true" ]; then
            NEEDS_BUILD=true
            NEEDS_COMPOSER=true
            ONLY_VIEWS=false
          fi

          echo "needs_build=$NEEDS_BUILD" >> $GITHUB_OUTPUT
          echo "needs_composer=$NEEDS_COMPOSER" >> $GITHUB_OUTPUT
          echo "only_views=$ONLY_VIEWS" >> $GITHUB_OUTPUT
          echo "--- Changed files ---"
          echo "$CHANGED"

      - name: Setup PHP
        if: steps.changes.outputs.needs_composer == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json, fileinfo
          coverage: none

      - name: Get composer cache dir
        if: steps.changes.outputs.needs_composer == 'true'
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer
        if: steps.changes.outputs.needs_composer == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install composer deps
        if: steps.changes.outputs.needs_composer == 'true'
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node
        if: steps.changes.outputs.needs_build == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm deps & build
        if: steps.changes.outputs.needs_build == 'true'
        run: |
          npm ci
          npm run build

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Incremental deploy (changed files only)
        if: github.event.inputs.full_deploy != 'true'
        run: |
          CHANGED='${{ steps.changes.outputs.files }}'

          CMDS=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [[ "$file" == .github/* ]] && continue
            [[ "$file" == .git/* ]] && continue
            [[ "$file" == node_modules/* ]] && continue
            [[ "$file" == tests/* ]] && continue
            [[ "$file" == .env* ]] && continue
            [[ "$file" == storage/logs/* ]] && continue
            [[ "$file" == storage/framework/cache/* ]] && continue
            [[ "$file" == storage/framework/sessions/* ]] && continue
            [[ "$file" == storage/framework/views/* ]] && continue

            REMOTE_DIR=$(dirname "$FTP_REMOTE_DIR/$file")

            if [ -f "$file" ]; then
              CMDS="${CMDS}mkdir -p ${REMOTE_DIR}; put ${file} -o ${FTP_REMOTE_DIR}/${file}; "
            else
              CMDS="${CMDS}rm -f ${FTP_REMOTE_DIR}/${file} 2>/dev/null; "
            fi
          done <<< "$CHANGED"

          if [ -z "$CMDS" ]; then
            echo "No FTP-relevant files changed, skipping."
            exit 0
          fi

          echo "Uploading changed files..."
          lftp -c "
            set ftp:ssl-allow no
            set ftp:passive-mode true
            set net:connection-limit 4
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER
            ${CMDS}
            quit
          "
          echo "Incremental deploy done."

      - name: Clear Laravel view cache on server
        run: |
          lftp -c "
            set ftp:ssl-allow no
            set ftp:passive-mode true
            set cmd:fail-exit false
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER
            cd $FTP_REMOTE_DIR/storage/framework/views
            mrm *.php
            quit
          " || true
          echo "View cache cleared (next request will recompile)."

      - name: Full deploy (mirror)
        if: github.event.inputs.full_deploy == 'true'
        run: |
          rm -rf .git .github node_modules
          find storage/logs storage/framework/cache/data storage/framework/sessions storage/framework/views -type f ! -name .gitkeep -delete 2>/dev/null || true
          mkdir -p storage/logs storage/framework/cache/data storage/framework/sessions storage/framework/views

          lftp -c "
            set ftp:ssl-allow no
            set ftp:passive-mode true
            set mirror:no-permissions true
            set net:limit-total-max 8
            set net:connection-limit 8
            set mirror:parallel-transfer-count 8
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER
            mirror -R -v --delete --exclude .env --exclude .git --exclude .github --exclude node_modules --exclude tests --exclude storage/logs --exclude storage/framework/cache/data --exclude storage/framework/sessions --exclude storage/framework/views . $FTP_REMOTE_DIR
            quit
          "
