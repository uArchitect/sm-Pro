# Laravel FTP Deploy - lftp ile paralel transfer (hızlı)
# Gerekli GitHub Secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, FTP_REMOTE_DIR (opsiyonel)
# FTP_SERVER mutlaka ftp:// ile başlamalı (örn: ftp://ftp.site.com veya ftp://site.com) — http:// DEĞİL
name: Deploy to FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FTP_SERVER: ${{ secrets.FTP_SERVER }}
  FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
  FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
  FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR || '/' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json, fileinfo
          coverage: none

      - name: Get composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install composer deps
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm deps & build
        run: |
          npm ci
          npm run build

      - name: Prepare deploy
        run: |
          rm -rf .git .github node_modules
          find storage/logs storage/framework/cache/data storage/framework/sessions storage/framework/views -type f ! -name .gitkeep -delete 2>/dev/null || true
          mkdir -p storage/logs storage/framework/cache/data storage/framework/sessions storage/framework/views
          touch storage/logs/.gitkeep storage/framework/cache/data/.gitkeep storage/framework/sessions/.gitkeep storage/framework/views/.gitkeep

      - name: Install lftp & Deploy via FTP (parallel)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y lftp
          lftp -c "
            set ftp:ssl-allow no
            set ftp:passive-mode true
            set net:limit-total-max 8
            set net:connection-limit 8
            set mirror:parallel-transfer-count 8
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER
            mkdir -p $FTP_REMOTE_DIR
            mirror -R -v --delete --no-permissions --exclude .env --exclude .git --exclude .github --exclude node_modules --exclude tests --exclude storage/logs --exclude storage/framework/cache/data --exclude storage/framework/sessions --exclude storage/framework/views . $FTP_REMOTE_DIR
            quit
          "
